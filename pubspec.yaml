name: balance_wave_flutter
description: "BalanceWave - Smart Mobile Balance Calculator for Pakistani Telecom Users."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animate_do: ^3.3.4
  vibration: ^3.1.8
  flutter_svg: ^2.0.10
  flutter_lucide: ^1.0.4
  intl: ^0.19.0
  flutter_staggered_animations: ^1.0.0
  shared_preferences: ^2.2.3
  responsive_sizer: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F172A"
  image: "assets/logos/icon.png"
  android_12:
    image: "assets/logos/icon.png"
    color: "#0F172A"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/images/
